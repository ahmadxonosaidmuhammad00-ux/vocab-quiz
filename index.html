<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Vocabulary Quiz</title>
</head>
<body>
    <div class="quiz-container">
        <h1>Vocabulary Quiz PRO</h1>
        <div class="quiz-content">
            <div id="question"></div>
            <div class="options">
                <button class="option" onclick="checkAnswer(this)"></button>
                <button class="option" onclick="checkAnswer(this)"></button>
                <button class="option" onclick="checkAnswer(this)"></button>
                <button class="option" onclick="checkAnswer(this)"></button>
            </div>
            <button id="next" onclick="nextQuestion()">Next</button>
        </div>
        <audio id="sound-effect" src="sound.mp3"></audio>
    </div>
    <script src="script.js"></script>
</body>
</html>
<script>
let questions = [
    { question: "What is the synonym of 'happy'?", options: ["sad", "joyful", "angry", "bored"], answer: 1 },
    { question: "What does 'benevolent' mean?", options: ["kind", "mean", "greedy", "selfish"], answer: 0 },
    { question: "What is the opposite of 'hot'?", options: ["cold", "warm", "cool", "boiling"], answer: 0 }
];

let currentQuestionIndex = 0;
function loadQuestion() {
    const currentQuestion = questions[currentQuestionIndex];
    document.getElementById('question').innerText = currentQuestion.question;
    const options = document.querySelectorAll('.option');
    options.forEach((option, index) => {
        option.innerText = currentQuestion.options[index];
    });
}

function checkAnswer(selectedOption) {
    const index = Array.from(document.querySelectorAll('.option')).indexOf(selectedOption);
    if (index === questions[currentQuestionIndex].answer) {
        document.getElementById('sound-effect').play();
        alert('Correct!');
    } else {
        alert('Wrong Answer!');
    }
    currentQuestionIndex++;
    if (currentQuestionIndex < questions.length) {
        loadQuestion();
    } else {
        alert('Quiz Finished!');
    }
}

function nextQuestion() {
    if (currentQuestionIndex < questions.length - 1) {
        currentQuestionIndex++;
        loadQuestion();
    }
}

// Load the first question when the page loads
window.onload = loadQuestion;
</script>
